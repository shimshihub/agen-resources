// State
let activeFilter = 'all';
let searchQuery = '';

// Helpers
function formatDate(dateStr) {
  const d = new Date(dateStr + 'T00:00:00');
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
}

function monthKey(dateStr) {
  const d = new Date(dateStr + 'T00:00:00');
  return d.toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
}

function resolvePath(filePath) {
  // Gallery is in research/ - resolve relative paths
  if (filePath.startsWith('research/')) {
    return filePath.replace('research/', '');
  }
  return '../' + filePath;
}

// Render stats
function renderStats() {
  const files = MANIFEST.files;
  const cats = {};
  files.forEach(f => { cats[f.category] = (cats[f.category] || 0) + 1; });
  const dates = files.map(f => f.date).sort();

  document.getElementById('stats').innerHTML =
    `<span class="stat"><strong>${files.length}</strong> outputs</span>` +
    `<span class="stat"><strong>${Object.keys(cats).length}</strong> categories</span>` +
    `<span class="stat">Spanning <strong>${formatDate(dates[0])}</strong> to <strong>${formatDate(dates[dates.length - 1])}</strong></span>`;

  document.getElementById('lastUpdated').textContent = MANIFEST.generated;
}

// Render filter pills
function renderFilters() {
  const container = document.getElementById('filters');
  const cats = {};
  MANIFEST.files.forEach(f => { cats[f.category] = (cats[f.category] || 0) + 1; });

  let html = `<button class="pill ${activeFilter === 'all' ? 'active' : ''}" data-filter="all">All<span class="count">${MANIFEST.files.length}</span></button>`;

  Object.entries(MANIFEST.categories).forEach(([key, cat]) => {
    if (cats[key]) {
      html += `<button class="pill ${activeFilter === key ? 'active' : ''}" data-filter="${key}">${cat.label}<span class="count">${cats[key]}</span></button>`;
    }
  });

  container.innerHTML = html;

  container.querySelectorAll('.pill').forEach(btn => {
    btn.addEventListener('click', () => {
      activeFilter = btn.dataset.filter;
      renderFilters();
      renderGallery();
    });
  });
}

// Render gallery cards
function renderGallery() {
  const container = document.getElementById('gallery');
  let files = [...MANIFEST.files];

  // Filter by category
  if (activeFilter !== 'all') {
    files = files.filter(f => f.category === activeFilter);
  }

  // Filter by search
  if (searchQuery) {
    const q = searchQuery.toLowerCase();
    files = files.filter(f =>
      f.title.toLowerCase().includes(q) ||
      f.description.toLowerCase().includes(q) ||
      f.tags.some(t => t.toLowerCase().includes(q)) ||
      (f.skill && f.skill.toLowerCase().includes(q)) ||
      f.category.toLowerCase().includes(q)
    );
  }

  // Sort by date descending
  files.sort((a, b) => b.date.localeCompare(a.date));

  if (files.length === 0) {
    container.innerHTML = `
      <div class="no-results">
        <h3>No matching outputs</h3>
        <p>Try a different search term or category filter.</p>
      </div>`;
    return;
  }

  // Group by month
  const groups = {};
  files.forEach(f => {
    const mk = monthKey(f.date);
    if (!groups[mk]) groups[mk] = [];
    groups[mk].push(f);
  });

  let html = '';
  Object.entries(groups).forEach(([month, items]) => {
    html += `<div class="month-group">`;
    html += `<div class="month-label">${month}</div>`;
    html += `<div class="card-grid">`;

    items.forEach(f => {
      const cat = MANIFEST.categories[f.category];
      html += `
        <div class="card">
          <div class="card-top">
            <span class="category-badge badge-${f.category}">${cat.label}</span>
            <span class="card-date">${formatDate(f.date)}</span>
          </div>
          <div class="card-title"><a href="${resolvePath(f.path)}">${f.title}</a></div>
          <div class="card-desc">${f.description}</div>
          <div class="card-footer">
            <div class="tag-list">${f.tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>
            ${f.skill ? `<span class="skill-badge">/${f.skill}</span>` : ''}
          </div>
        </div>`;
    });

    html += `</div></div>`;
  });

  container.innerHTML = html;
}

// Init
document.getElementById('search').addEventListener('input', e => {
  searchQuery = e.target.value;
  renderGallery();
});

renderStats();
renderFilters();
renderGallery();
</script>
